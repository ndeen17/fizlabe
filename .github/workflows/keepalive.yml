name: keepalive

# Pings the deployed Render service every 10 minutes so it does not
# auto-sleep on the free tier (15 min idle timeout).
#
# Setup: in GitHub repo settings, add a repository variable named
# RENDER_URL with the full base URL of the deployed backend, e.g.
#   https://fizlabe.onrender.com
# Settings -> Secrets and variables -> Actions -> Variables tab -> New variable.
#
# You can also trigger it manually from the Actions tab.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health
        env:
          RENDER_URL: ${{ vars.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "RENDER_URL repository variable is not set; skipping."
            exit 0
          fi
          echo "Pinging $RENDER_URL/health"
          # -m gives Render up to 60s to wake from cold start.
          # --retry handles transient failures during boot.
          curl -fsS -m 60 --retry 3 --retry-delay 5 "$RENDER_URL/health"
          echo
